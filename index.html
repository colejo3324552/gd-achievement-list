<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Achievement List</title>

<style>
/* THEME SYSTEM VARIABLES */
:root {
    --bg-gradient: linear-gradient(-45deg, #0a0a0a, #111111, #181022, #0a0a0a);
    --header-bg: linear-gradient(90deg, #ff2d2d, #7a5cff);
    --text-main: white;
    --text-sub: #aaa;
    --input-bg: #1b1b1b;
    --input-border: rgba(255,255,255,0.1);
    --card-bg: #151515;
    --border: rgba(255,255,255,0.05);
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text-main);
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 50px;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
header {
    width: 100%;
    padding: 35px 0;
    text-align: center;
    background: var(--header-bg);
}

h1 { margin: 0; font-size: 52px; color: white; text-transform: uppercase; letter-spacing: 2px; }
h2 { margin: 8px 0 0; font-weight: normal; color: #ddd; font-size: 20px; }

/* UTILITY BAR */
.utility-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding: 25px 18px;
    max-width: 900px;
    width: calc(100% - 36px);
}

.search-container {
    flex: 2;
    display: flex;
}

.search-container input {
    width: 100%;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    outline: none;
}

.sort-container {
    flex: 1;
    display: flex;
}

.sort-container select {
    width: 100%;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 18px;
    cursor: pointer;
    outline: none;
}

/* LIST CONFIGURATION */
.list {
    width: 90%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 24px;
    transition: transform 0.2s, border-color 0.2s;
    border: 1px solid var(--border);
    gap: 6px;
}

.card:hover {
    transform: scale(1.015);
    border-color: var(--hover-color, #ff2d2d);
}

.name {
    font-size: 28px;
    font-weight: bold;
    color: white;
}

.achieved-by {
    font-size: 16px;
    color: var(--text-sub);
}

.achieved-by strong {
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>The Achievement List</h1>
    <h2>A geometry dash list of the greatest achievements ever.</h2>
</header>

<div class="utility-bar">
    <div class="search-container">
        <input id="search" placeholder="Search achievements or players..." onkeyup="render()">
    </div>
    <div class="sort-container">
        <select id="sort" onchange="render()">
            <option value="placement">Sort: Placement (#1 - #4)</option>
            <option value="alphabetical">Sort: Name (A-Z)</option>
        </select>
    </div>
</div>

<div class="list" id="list"></div>

<script>
const achievements = [
    { id: 1, name: "GRIEF 97%", player: "Doggie", hoverColor: "#800020" },
    { id: 2, name: "KOCMOC UNLEASHED 19-91%", player: "Arshadow", hoverColor: "#ffffff" },
    { id: 3, name: "Society 72%", player: "wPopoff", hoverColor: "#7080ec" },
    { id: 4, name: "Sweeping Demon 2 86%", player: "Taiago", hoverColor: "#ff6b35" } // Added entry with an orange-red glow
];

function render() {
    const listElement = document.getElementById("list");
    const searchVal = document.getElementById("search").value.toLowerCase();
    const sortVal = document.getElementById("sort").value;

    listElement.innerHTML = "";

    let filtered = achievements.filter(item => 
        item.name.toLowerCase().includes(searchVal) || 
        item.player.toLowerCase().includes(searchVal)
    );

    if (sortVal === "alphabetical") {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
    } else {
        filtered.sort((a, b) => a.id - b.id);
    }

    filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.setProperty('--hover-color', item.hoverColor);
        card.innerHTML = `
            <div class="name">#${item.id} ${item.name}</div>
            <div class="achieved-by">Achieved by: <strong>${item.player}</strong></div>
        `;
        listElement.appendChild(card);
    });
}

render();
</script>

</body>
</html>
